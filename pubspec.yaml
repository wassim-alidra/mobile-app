name: agrigov_transporter
description: AgriGov Transporter Mobile App - Manage deliveries and orders on the go.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & Networking
  http: ^1.2.0
  dio: ^5.4.0

  # State Management
  provider: ^6.1.2

  # Local Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # UI Components
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.0
  badges: ^3.1.2

  # Navigation
  go_router: ^13.2.0

  # Maps & Routing
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  polyline_codec: ^0.1.6

  # Utilities
  intl: ^0.19.0
  timeago: ^3.6.1
  url_launcher: ^6.2.6
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/


  # Local fonts section removed as the project uses google_fonts and the files are missing.

